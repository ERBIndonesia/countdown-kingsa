<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGSA Countdown</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:#f4c96d;
  --gold2:#ffe3a1;
}

body{
  min-height:100vh;
  font-family:Arial,Helvetica,sans-serif;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  background:
    radial-gradient(circle at top left, rgba(244,201,109,0.15), transparent 25%),
    radial-gradient(circle at bottom right, rgba(255,226,155,0.08), transparent 30%),
    linear-gradient(135deg,#050505,#0a0a0a,#151008);
}

/* PARTICLES */
.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.particle{
  position:absolute;
  bottom:-20px;
  border-radius:50%;
  background:radial-gradient(circle,#ffe3a1,#f4c96d,transparent);
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(0);opacity:0}
  10%{opacity:.7}
  100%{transform:translateY(-110vh);opacity:0}
}

/* WRAP */
.wrap{
  max-width:1000px;
  width:100%;
  padding:30px 20px;
}

/* PILL */
.pill{
  display:inline-flex;
  gap:10px;
  align-items:center;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(244,201,109,.3);
  background:rgba(244,201,109,.08);
  color:var(--gold2);
  font-size:12px;
  letter-spacing:.15em;
  margin-bottom:25px;
}

.dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--gold2);
  box-shadow:0 0 10px #ffe3a1;
}

/* TEXT */
.lead{
  font-size:clamp(18px,2vw,28px);
  color:#ccc;
  margin-bottom:10px;
}

.headline{
  font-size:clamp(48px,8vw,110px);
  font-weight:900;
  line-height:.9;
  text-transform:uppercase;
}

.gold{
  display:block;
  background:linear-gradient(90deg,#fff5cb,#ffd974,#d8922f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.and{
  font-size:.6em;
  color:var(--gold2);
  margin:15px 0;
}

.meta{
  margin:20px 0 30px;
  color:var(--gold2);
  font-weight:700;
  letter-spacing:.05em;
}

/* LOGO CENTER */
.logo-center{
  display:flex;
  justify-content:center;
  margin-bottom:25px;
}

.logo-center img{
  width:90px;
  height:90px;
  padding:12px;
  border-radius:20px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
}

/* COUNTDOWN */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:25px;
}

.card{
  padding:18px 10px;
  border-radius:20px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
}

.num{
  font-size:clamp(30px,5vw,60px);
  font-weight:900;
  color:#fff0c1;
}

.num.flip{
  animation:flip .5s;
}

@keyframes flip{
  0%{transform:rotateX(0)}
  50%{transform:rotateX(90deg)}
  100%{transform:rotateX(0)}
}

.label{
  font-size:10px;
  letter-spacing:.2em;
  color:#aaa;
  margin-top:8px;
}

/* CTA */
.cta{
  font-size:clamp(22px,3vw,40px);
  font-weight:800;
  color:var(--gold2);
}

/* RESPONSIVE */
@media(min-width:1024px){
  .headline{font-size:110px}
  .num{font-size:70px}
  .cta{font-size:38px}
  .logo-center img{width:110px;height:110px}
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="wrap">

<div class="pill">
  <div class="dot"></div>
  Menuju Momen Spesial KINGSA
</div>

<p class="lead">Menghitung Hari Menuju...</p>

<h1 class="headline">
  <span class="gold">Kingsa</span>
  <span class="gold">Sukses</span>
  <span class="gold">Celebration</span>
</h1>

<div class="meta">
  SPORTORIUM UMY
  <br>
  YOGYAKARTA - 27 JUNI 2026
</div>

<div class="logo-center">
  <img src="logo-kingsa.png">
</div>

<div class="grid">
  <div class="card"><div class="num" id="d">00</div><div class="label">HARI</div></div>
  <div class="card"><div class="num" id="h">00</div><div class="label">JAM</div></div>
  <div class="card"><div class="num" id="m">00</div><div class="label">MENIT</div></div>
  <div class="card"><div class="num" id="s">00</div><div class="label">DETIK</div></div>
</div>

<p class="cta">
Siapkan diri anda untuk naik panggung kesuksesan..
</p>

</div>

<script>
const target=new Date("2026-06-27T00:00:00+07:00").getTime();

function pad(n){return String(n).padStart(2,"0");}

function flip(el,val){
  if(el.textContent!==val){
    el.classList.remove("flip");
    void el.offsetWidth;
    el.textContent=val;
    el.classList.add("flip");
  }
}

function run(){
  const now=Date.now();
  const dist=target-now;

  const d=Math.floor(dist/86400000);
  const h=Math.floor((dist%86400000)/3600000);
  const m=Math.floor((dist%3600000)/60000);
  const s=Math.floor((dist%60000)/1000);

  flip(document.getElementById("d"),pad(d));
  flip(document.getElementById("h"),pad(h));
  flip(document.getElementById("m"),pad(m));
  flip(document.getElementById("s"),pad(s));
}

setInterval(run,1000);
run();

/* PARTICLES */
const pWrap=document.getElementById("particles");
for(let i=0;i<25;i++){
  let p=document.createElement("span");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.width=p.style.height=(Math.random()*4+2)+"px";
  p.style.animationDuration=(Math.random()*8+8)+"s";
  p.style.animationDelay=(Math.random()*5)+"s";
  pWrap.appendChild(p);
}
</script>

</body>
</html>
