<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KINGSA COUNTDOWN</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-1: #050505;
      --bg-2: #0d0b08;
      --gold-1: #f3c86b;
      --gold-2: #ffdf8b;
      --gold-3: #b8842f;
      --text-soft: rgba(255, 255, 255, 0.72);
      --border: rgba(255, 220, 140, 0.18);
      --panel: rgba(255, 255, 255, 0.05);
      --shadow-gold: 0 0 40px rgba(243, 200, 107, 0.16);
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      color: #fff;
      background:
        radial-gradient(circle at top, rgba(243, 200, 107, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 223, 139, 0.08), transparent 28%),
        linear-gradient(135deg, var(--bg-1), #111, #17120b, var(--bg-1));
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 30px;
      text-align: center;
    }

    .headline {
      font-size: 56px;
      font-weight: 900;
      line-height: 1.2;
    }

    .gold {
      display: block;
      background: linear-gradient(90deg, #fff1ba, var(--gold-1), #ffb548);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtext {
      margin-top: 15px;
      font-size: 20px;
      color: var(--text-soft);
      letter-spacing: 2px;
    }

    .countdown {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 20px;
      min-width: 120px;
    }

    .number {
      font-size: 48px;
      font-weight: bold;
      color: var(--gold-2);
    }

    .label {
      font-size: 12px;
      letter-spacing: 2px;
      margin-top: 5px;
      color: rgba(255,255,255,0.6);
    }

    .cta {
      margin-top: 40px;
      font-size: 20px;
      color: var(--gold-2);
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1 class="headline">
      Menghitung Hari Menuju...
      <span class="gold">Grand Launching</span>
      <span class="gold">&</span>
      <span class="gold">KINGSA SUKSES CELEBRATION</span>
    </h1>

    <div class="subtext">
      SPORTORIUM UMY • 27 JUNI 2026
    </div>

    <div class="countdown">
      <div class="box">
        <div id="days" class="number">00</div>
        <div class="label">HARI</div>
      </div>
      <div class="box">
        <div id="hours" class="number">00</div>
        <div class="label">JAM</div>
      </div>
      <div class="box">
        <div id="minutes" class="number">00</div>
        <div class="label">MENIT</div>
      </div>
      <div class="box">
        <div id="seconds" class="number">00</div>
        <div class="label">DETIK</div>
      </div>
    </div>

    <div class="cta">
      Siapkan diri anda untuk naik panggung kesuksesan.
    </div>

  </div>

  <script>
    const target = new Date("2026-06-27T00:00:00+07:00").getTime();

    function update() {
      const now = new Date().getTime();
      const distance = target - now;

      if (distance <= 0) return;

      const d = Math.floor(distance / (1000 * 60 * 60 * 24));
      const h = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const m = Math.floor((distance / (1000 * 60)) % 60);
      const s = Math.floor((distance / 1000) % 60);

      document.getElementById("days").innerText = d.toString().padStart(2, "0");
      document.getElementById("hours").innerText = h.toString().padStart(2, "0");
      document.getElementById("minutes").innerText = m.toString().padStart(2, "0");
      document.getElementById("seconds").innerText = s.toString().padStart(2, "0");
    }

    setInterval(update, 1000);
    update();
  </script>

</body>
</html>
